name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Privacy Lint ─────────────────────────────────────────────────────────────
  privacy-lint:
    name: Privacy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify no unauthorized URLSession usage
        run: |
          set -euo pipefail
          # Only the StoreKit manager is allowed to make network calls (App Store validation).
          VIOLATIONS=$(grep -rl "URLSession\|URLRequest\|Network\.framework" \
            --include="*.swift" \
            ParkArmor/ ParkArmorWidgetExtension/ \
            "ParkArmorWatch Watch App/" \
            ParkArmorWatchComplication/ \
            | grep -v "ParkArmor/Services/StoreKitManager.swift" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Unauthorized network calls found in:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No unauthorized network calls found."

      - name: Verify no analytics SDKs
        run: |
          set -euo pipefail
          ANALYTICS_PATTERNS="Firebase|Mixpanel|Amplitude|Segment|AppsFlyer|Crashlytics|Sentry|Datadog"
          VIOLATIONS=$(grep -rl "$ANALYTICS_PATTERNS" \
            --include="*.swift" --include="Package.swift" --include="Podfile" \
            . || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Analytics SDK references found in:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No analytics SDKs detected."

      - name: Verify no iCloud / CloudKit usage
        run: |
          set -euo pipefail
          VIOLATIONS=$(grep -rl "CloudKit\|NSUbiquitousKeyValueStore\|NSPersistentCloudKitContainer" \
            --include="*.swift" \
            . || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ CloudKit / iCloud usage found in:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No CloudKit usage detected."

      - name: Validate PrivacyInfo.xcprivacy files
        run: |
          set -euo pipefail
          VALID_TYPES="NSPrivacyAccessedAPICategoryFileTimestamp|NSPrivacyAccessedAPICategorySystemBootTime|NSPrivacyAccessedAPICategoryDiskSpace|NSPrivacyAccessedAPICategoryUserDefaults"
          VIOLATIONS=0
          while IFS= read -r -d '' file; do
            INVALID=$(grep -o "NSPrivacyAccessedAPICategory[A-Za-z]*" "$file" | grep -vE "^($VALID_TYPES)$" || true)
            if [ -n "$INVALID" ]; then
              echo "❌ $file contains invalid NSPrivacyAccessedAPIType categories:"
              echo "$INVALID"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done < <(find . -name "PrivacyInfo.xcprivacy" -print0)
          if [ "$VIOLATIONS" -gt 0 ]; then exit 1; fi
          echo "✅ All PrivacyInfo.xcprivacy files use valid API categories."

  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun simctl list runtimes | grep -E "iOS" | head -5
          xcrun simctl list devices available | grep -E "iPhone" | head -5

      - name: Resolve package dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project ParkArmor.xcodeproj \
            -scheme ParkArmor

      - name: Build (no signing)
        run: |
          set -euo pipefail
          xcodebuild build \
            -project ParkArmor.xcodeproj \
            -scheme ParkArmor \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Run unit tests
        run: |
          set -euo pipefail
          DEVICE=$(xcrun simctl list devices available | grep -E "iPhone 1[5-9]|iPhone 2" | head -1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          echo "Testing on device: $DEVICE"
          xcodebuild test \
            -project ParkArmor.xcodeproj \
            -scheme ParkArmor \
            -destination "id=$DEVICE" \
            -only-testing:ParkArmorTests \
            -resultBundlePath test-results.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: test-results.xcresult
          retention-days: 14

  # ── Upload to TestFlight (main branch + tags only) ────────────────────────────
  upload:
    name: Upload to TestFlight
    runs-on: macos-latest
    needs: [privacy-lint, build-and-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Python deps
        run: pip3 install PyJWT requests --quiet --break-system-packages

      - name: Compute next build number
        run: |
          set -euo pipefail
          BUILD_NUMBER=$(python3 ci_scripts/next_build.py 6760988040)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Build number: $BUILD_NUMBER"

      - name: Set build number in project
        run: |
          set -euo pipefail
          find . -name "project.pbxproj" -exec \
            sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" {} +
          echo "Set CURRENT_PROJECT_VERSION = $BUILD_NUMBER"

      - name: Write ASC API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Archive (signed)
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project ParkArmor.xcodeproj \
            -scheme ParkArmor \
            -destination "generic/platform=iOS" \
            -archivePath build/ParkArmor.xcarchive \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=2SGGP65W6C \
            -quiet

      - name: Export and upload to TestFlight
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath build/ParkArmor.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Cleanup API key
        if: always()
        run: rm -f ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
