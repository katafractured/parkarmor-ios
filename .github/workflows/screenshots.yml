name: Auto-refresh App Store screenshots

# Doctrine: feedback_screenshots_never_manual.md
# Every UI change auto-regenerates + uploads screenshots via ASC API.

on:
  push:
    branches: [ main ]
    paths:
      - 'Sources/UI/**/*.swift'
      - 'Sources/Views/**/*.swift'
      - 'Sources/Features/**/*.swift'
      - 'ParkArmor/**/*.swift'
      - '**/Assets.xcassets/**'
      - '**/*.entitlements'
      - 'fastlane/Snapfile'
      - 'fastlane/Fastfile'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run'
        required: false
        default: 'false'

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Capture + upload screenshots
    runs-on: [ self-hosted, macOS, ios-build, ARM64 ]
    timeout-minutes: 60

    env:
      APP_NAME: parkarmor
      BUNDLE_ID: com.katafract.ParkArmor
      SCHEME: ParkArmor
      FASTLANE_LANE: submit_version_screenshots
      DOCS_INTERNAL_REPO: katafract-io/docs-internal

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Notify Matrix - screenshot run started
        run: |
          PAYLOAD="{\"text\":\"📸 ${{ github.repository }} screenshots run #${{ github.run_number }} started (ref ${{ github.ref_name }})\"}"
          curl -s -X POST https://webhooks.katafract.io/webhook/ci \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
            -d "$PAYLOAD" || true

      - name: Load runner env
        run: |
          ENV_FILE="$HOME/runner-env/${APP_NAME}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::Missing $ENV_FILE"; exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep '=' >> "$GITHUB_ENV"

      - name: Ensure ASC private key on disk
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ ! -f "$ASC_KEY_PATH" ]; then
            if [ -n "$ASC_PRIVATE_KEY" ]; then
              mkdir -p "$(dirname "$ASC_KEY_PATH")"
              printf '%s' "$ASC_PRIVATE_KEY" > "$ASC_KEY_PATH"
              chmod 600 "$ASC_KEY_PATH"
            else
              echo "::error::no ASC_PRIVATE_KEY and no local file at $ASC_KEY_PATH"; exit 1
            fi
          fi

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" || { echo "warn: unlock failed"; exit 0; }

      - name: Reset vendor/bundle (avoid stale bundler cache)
        run: rm -rf vendor/bundle

      - name: Install Ruby deps (Ruby 3.3.x via rbenv or system)
        run: |
          # Probe for Ruby 3.3.11: cmfmbp $HOME/.rbenv, chronos $HOME/.rbenv, or fallback to system
          RUBY_BIN=""
          if [ -x "${HOME}/.rbenv/versions/3.3.11/bin/ruby" ]; then
            RUBY_BIN="${HOME}/.rbenv/versions/3.3.11/bin/ruby"
          elif command -v rbenv >/dev/null 2>&1; then
            # rbenv on PATH; use it to locate ruby
            eval "$(rbenv init - bash)"
            RUBY_BIN="$(rbenv which ruby 2>/dev/null)"
          fi

          # Fall back to system ruby if rbenv not found
          if [ -z "$RUBY_BIN" ] || [ ! -x "$RUBY_BIN" ]; then
            RUBY_BIN="$(command -v ruby 2>/dev/null)"
          fi

          if [ -z "$RUBY_BIN" ] || [ ! -x "$RUBY_BIN" ]; then
            echo "::error::Could not find Ruby 3.3.x"; exit 1
          fi

          export PATH="$(dirname "$RUBY_BIN"):$PATH"
          $RUBY_BIN --version
          $RUBY_BIN -S bundle --version || $RUBY_BIN -S gem install bundler
          $RUBY_BIN -S bundle config set --local path 'vendor/bundle'
          $RUBY_BIN -S bundle install --jobs 4 --retry 3 2>&1 | tail -20
          $RUBY_BIN -S bundle exec fastlane --version 2>&1 | head -3

      - name: Run fastlane screenshot lane
        id: fastlane
        run: |
          set -o pipefail
          # Use same Ruby probe as Install step
          RUBY_BIN=""
          if [ -x "${HOME}/.rbenv/versions/3.3.11/bin/ruby" ]; then
            RUBY_BIN="${HOME}/.rbenv/versions/3.3.11/bin/ruby"
          elif command -v rbenv >/dev/null 2>&1; then
            eval "$(rbenv init - bash)"
            RUBY_BIN="$(rbenv which ruby 2>/dev/null)"
          fi
          if [ -z "$RUBY_BIN" ] || [ ! -x "$RUBY_BIN" ]; then
            RUBY_BIN="$(command -v ruby 2>/dev/null)"
          fi
          export PATH="$(dirname "$RUBY_BIN"):$PATH"
          OUTFILE=$(mktemp)
          $RUBY_BIN -S bundle exec fastlane "${FASTLANE_LANE}" 2>&1 | tee "$OUTFILE"
          SHOT_COUNT=$(grep -c "screenshot uploaded" "$OUTFILE" || echo "0")
          echo "shot_count=${SHOT_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Clone docs-internal + commit screenshot logs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOG_DIR="/tmp/docs-internal-logs"
          rm -rf "$LOG_DIR"
          git clone --depth 1 "https://github.com/${DOCS_INTERNAL_REPO}.git" "$LOG_DIR"
          TS=$(date -u +%Y%m%d-%H%M%S)
          TAIL=$(tail -50 /tmp/fastlane.log 2>/dev/null || echo "no logs")
          mkdir -p "$LOG_DIR/runbooks/screenshot_runs"
          
          cat > "$LOG_DIR/runbooks/screenshot_runs/${APP_NAME}-${TS}.md" << 'LOG_EOF'
          # Screenshot run: ${{ github.repository }} #${{ github.run_number }}
          
          - App: `${APP_NAME}`
          - Run: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - Triggered by: \`${{ github.event_name }}\` by \`${{ github.actor }}\`
          - Fastlane lane: \`${FASTLANE_LANE}\`
          - Shot count: \`${SHOT_COUNT}\`
          - Bundle: \`${BUNDLE_ID}\`

          ## Fastlane tail (last 50 lines)

          \`\`\`
          ${TAIL}
          \`\`\`
          LOG_EOF
          cd "$LOG_DIR"
          git config user.name "katafract-ci"
          git config user.email "ci@katafract.com"
          git add runbooks/screenshot_runs/
          git commit -m "screenshots: ${APP_NAME} run ${TS} (#${{ github.run_number }})" || { echo "nothing to commit"; exit 0; }
          git push origin main

      - name: Notify Matrix - screenshot run SUCCEEDED
        if: success()
        run: |
          SHOTS="${{ steps.fastlane.outputs.shot_count }}"
          PAYLOAD="{\"text\":\"✅ ${{ github.repository }} screenshots uploaded (${SHOTS} shots, run #${{ github.run_number }})\"}"
          curl -s -X POST https://webhooks.katafract.io/webhook/ci \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
            -d "$PAYLOAD" || true

      - name: Notify Matrix - screenshot run FAILED
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"text\":\"🔴 ${{ github.repository }} screenshots FAILED (run #${{ github.run_number }}) — $RUN_URL\"}"
          for ROOM in ci alerts; do
            curl -s -X POST "https://webhooks.katafract.io/webhook/$ROOM" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: ${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
              -d "$PAYLOAD" || true
          done
