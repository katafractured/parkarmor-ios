name: Auto-refresh App Store screenshots

on:
  push:
    branches: [ main ]
    paths:
      - 'ParkArmor/**/*.swift'
      - '**/Assets.xcassets/**'
      - '**/*.entitlements'
      - 'fastlane/Snapfile'
      - 'fastlane/Fastfile'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Capture + upload screenshots
    runs-on: [ self-hosted, macOS, ios-build ]
    timeout-minutes: 60

    env:
      APP_NAME: parkarmor
      BUNDLE_ID: com.katafract.ParkArmor
      SCHEME: ParkArmor
      FASTLANE_LANE: submit_version_screenshots
      DOCS_INTERNAL_REPO: katafract-io/docs-internal

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Notify Matrix - screenshot run started
        run: |
          PAYLOAD="{\"text\":\"📸 ${{ github.repository }} screenshots run #${{ github.run_number }} started\"}"
          curl -s -X POST https://webhooks.katafract.io/webhook/ci \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.MATRIX_WEBHOOK_SECRET }}" \
            -d "$PAYLOAD" || true

      - name: Run fastlane capture_ios_screenshots
        run: |
          cd fastlane && fastlane ios capture_ios_screenshots
